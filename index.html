<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turni Porter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { font-family: 'Segoe UI', system-ui, sans-serif; box-sizing: border-box; font-size: 16px; }
    body { background: #f1f5f9; margin: 0; }

    .app-header { background: #1e293b; color: white; padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
    .banner-skipped { background: #7f1d1d; color: #fca5a5; text-align: center; padding: 8px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 101; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .header-title { font-size: 26px; font-weight: 700; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .header-actions button { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; padding: 4px; }
    .header-actions button:hover { color: white; }

    .date-nav { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .date-btn { background: #334155; border: none; color: #94a3b8; border-radius: 20px; padding: 5px 14px; font-size: 15px; cursor: pointer; transition: all 0.2s; }
    .date-btn.active { background: #475569; color: white; font-weight: 600; }
    .date-btn:hover { background: #475569; color: white; }

    .counter-bar { font-size: 14px; color: #94a3b8; padding: 6px 16px; background: #1e293b; border-top: 1px solid #334155; }
    .counter-bar span.red { color: #f87171; }

    .shifts-list { padding: 12px 12px 100px; }

    .shift-card { background: white; border-radius: 14px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid transparent; }
    .shift-card.skipped { background: #fff5f5; border-left-color: #ef4444; }
    .shift-card.current { border-left-color: #10b981; background: #f0fdf4; }
    .shift-card.completed { opacity: 0.5; }
    .shift-card.completed .badge-task,
    .shift-card.completed .card-time { text-decoration: line-through; color: #9ca3af; }
    .shift-card.completed .take-row,
    .shift-card.completed .task-desc,
    .shift-card.completed .card-meta { text-decoration: line-through; color: #9ca3af; }

    .card-top { display: flex; align-items: center; gap: 8px; padding: 12px 12px 6px; flex-wrap: wrap; }
    .card-time { font-size: 18px; font-weight: 700; color: #475569; display: flex; align-items: center; gap: 4px; }
    .badge { font-size: 13px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .badge-skipped { background: #fee2e2; color: #dc2626; }
    .badge-current { background: #d1fae5; color: #059669; }
    .badge-pax { background: #e2e8f0; color: #475569; }
    .badge-task { background: #ede9fe; color: #7c3aed; font-size: 14px; padding: 2px 10px; }

    .task-desc { font-size: 15px; color: #64748b; margin: 0 12px 8px; background: #f8fafc; border-left: 3px solid #a78bfa; padding: 6px 10px; border-radius: 0 8px 8px 0; }
    .card-meta { font-size: 14px; color: #94a3b8; padding: 0 12px 6px; }
    .card-meta span { margin-right: 10px; }

    .take-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-top: 1px solid #f1f5f9; }
    .take-input { flex: 1; border: none; background: none; font-size: 16px; color: #334155; outline: none; }
    .take-input::placeholder { color: #94a3b8; }
    .taken-name { font-size: 16px; font-weight: 600; color: #059669; }

    .card-bottom { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px 10px; }
    .circle-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #cbd5e1; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .circle-check.done { background: #10b981; border-color: #10b981; }
    .circle-check.done::after { content: '✓'; color: white; font-size: 14px; font-weight: 700; }
    .card-actions { display: flex; gap: 6px; }
    .card-actions button { background: none; border: none; font-size: 16px; cursor: pointer; color: #94a3b8; padding: 4px; border-radius: 6px; }
    .card-actions button:hover { background: #f1f5f9; color: #475569; }

    .fab { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: #f97316; color: white; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 16px rgba(249,115,22,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; transition: transform 0.2s; }
    .fab:hover { transform: scale(1.1); }

    .empty { text-align: center; padding: 60px 20px; color: #94a3b8; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: white; border-radius: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .modal-header { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 1; }
    .modal-header h3 { font-size: 18px; font-weight: 700; margin: 0; }
    .modal-header button { background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; }
    .modal-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid #f1f5f9; display: flex; gap: 10px; }
    label { font-size: 13px; font-weight: 600; color: #475569; display: block; margin-bottom: 5px; }
    input[type=text], input[type=time], input[type=number], input[type=password], textarea { width: 100%; padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: border 0.2s; }
    input:focus, textarea:focus { border-color: #f97316; }
    .btn { padding: 11px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; flex: 1; }
    .btn-primary { background: linear-gradient(135deg, #f97316, #dc2626); color: white; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #475569; }

    .admin-login { display: flex; gap: 6px; align-items: center; margin-left: auto; }
    .admin-login input { width: 110px; padding: 5px 10px; font-size: 12px; border-radius: 20px; border: 1px solid #475569; background: #334155; color: white; outline: none; }
    .admin-login input::placeholder { color: #64748b; }
    .admin-login button { padding: 5px 12px; border-radius: 20px; background: #f97316; color: white; border: none; font-size: 12px; cursor: pointer; }

    #skippedAlert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9999; align-items: center; justify-content: center; }
    #skippedAlert.show { display: flex; }

    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .shift-card { animation: slideUp 0.25s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="skippedAlert">
  <div style="background:white;border-radius:20px;max-width:360px;width:100%;margin:16px;overflow:hidden;">
    <div style="background:#dc2626;padding:24px;text-align:center;color:white;">
      <div style="font-size:48px;margin-bottom:8px;">⚠️</div>
      <div style="font-size:20px;font-weight:700;">TASK SALTATA!</div>
    </div>
    <div style="padding:20px;text-align:center;">
      <p style="color:#64748b;margin-bottom:8px;">Non è stata presa in carico:</p>
      <p id="skippedTaskName" style="font-size:22px;font-weight:700;color:#dc2626;margin-bottom:4px;"></p>
      <p id="skippedTaskTime" style="color:#94a3b8;margin-bottom:20px;"></p>
      <button onclick="closeSkippedAlert()" style="width:100%;padding:12px;background:#dc2626;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">Ho capito</button>
    </div>
  </div>
</div>

<div id="root"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDuE12IXeLyS5pUx7AzfHN8Os7kCnVUNBU",
    authDomain: "agenda-porter.firebaseapp.com",
    projectId: "agenda-porter",
    storageBucket: "agenda-porter.firebasestorage.app",
    messagingSenderId: "321152435125",
    appId: "1:321152435125:web:0d601e5718c871b5a08ffc"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const ADMIN_PASSWORD = 'porter2025';

  let state = {
    isAdmin: false, password: '', dayOffset: 0,
    shifts: [], loading: true, syncing: false,
    showAddModal: false, showImportModal: false, editingShift: null,
    newShift: { time:'', pax:'', task:'', taskDescription:'', porter:'', auto:'', note:'' },
    alertedShifts: new Set()
  };

  function getDate(offset) {
    const d = new Date(); d.setDate(d.getDate() + offset);
    return d.toISOString().split('T')[0];
  }
  function selectedDate() { return getDate(state.dayOffset); }
  function timeToMin(t) { if (!t) return -1; const [h,m]=t.split(':').map(Number); return h*60+m; }
  function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
  function nowStr() { return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}); }

  function scrollToCurrent() {
    // Prima prova task IN CORSO
    const current = document.querySelector('.current');
    if (current) { current.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
    // Altrimenti trova la task con orario più vicino all'ora attuale
    const now = nowMin();
    const today = state.shifts.filter(s => s.date === selectedDate() && s.time);
    if (today.length === 0) return;
    // Trova quella con differenza minima in valore assoluto
    const closest = today.reduce((best, s) => {
      return Math.abs(timeToMin(s.time) - now) < Math.abs(timeToMin(best.time) - now) ? s : best;
    });
    const el = document.getElementById('card-' + closest.id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function shiftStatus(shift) {
    if (shift.completed) return 'completed';
    if (!shift.time) return 'normal';
    const diff = nowMin() - timeToMin(shift.time);
    if (diff >= 0 && diff < 15) return 'current';
    if (diff >= 15 && !shift.takenBy) return 'skipped';
    return 'normal';
  }

  function checkSkipped() {
    if (state.dayOffset !== 0) return;
    state.shifts.filter(s => s.date === selectedDate() && shiftStatus(s) === 'skipped' && !state.alertedShifts.has(s.id))
      .forEach(s => {
        state.alertedShifts.add(s.id);
        document.getElementById('skippedTaskName').textContent = s.task || '—';
        document.getElementById('skippedTaskTime').textContent = 'Orario: ' + (s.time || '');
        document.getElementById('skippedAlert').classList.add('show');
        if (navigator.vibrate) navigator.vibrate([300,100,300]);
      });
  }
  function closeSkippedAlert() { document.getElementById('skippedAlert').classList.remove('show'); }

  function loadShifts() {
    state.syncing = true; render();
    db.collection('shifts').get().then(snap => {
      state.shifts = [];
      snap.forEach(doc => state.shifts.push({ id: doc.id, ...doc.data() }));
      state.loading = false; state.syncing = false; render();
      setTimeout(scrollToCurrent, 300);
      checkSkipped();
    }).catch(e => { console.error(e); state.loading = false; state.syncing = false; render(); });
  }

  function saveShift(shift) {
    state.syncing = true; render();
    const { id, ...data } = shift;
    const docId = (id && id.startsWith('shift_')) ? id : 'shift_' + Date.now();
    db.collection('shifts').doc(docId).set(data).then(() => loadShifts())
      .catch(() => { alert('Errore salvataggio'); state.syncing = false; render(); });
  }

  function deleteShift(id) {
    if (!confirm('Eliminare questo turno?')) return;
    state.syncing = true; render();
    db.collection('shifts').doc(id).delete().then(() => loadShifts())
      .catch(() => { alert('Errore'); state.syncing = false; render(); });
  }

  function toggleComplete(id) {
    const s = state.shifts.find(x => x.id === id);
    if (s) saveShift({ ...s, completed: !s.completed });
  }

  function handleLogin() {
    if (state.password === ADMIN_PASSWORD) { state.isAdmin = true; state.password = ''; render(); }
    else alert('Password errata!');
  }

  function handleTakeShift(id, name) {
    const s = state.shifts.find(x => x.id === id);
    if (s && name.trim()) saveShift({ ...s, takenBy: name.trim() });
  }

  function handleAddShift() {
    if (!state.newShift.time) return;
    saveShift({ id:'shift_'+Date.now(), date:selectedDate(), ...state.newShift, takenBy:'', completed:false });
    state.showAddModal = false;
    state.newShift = { time:'', pax:'', task:'', taskDescription:'', porter:'', auto:'', note:'' };
    render();
  }

  function handleUpdateShift() { saveShift(state.editingShift); state.editingShift = null; render(); }

  function handleFileUpload(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
      let count = 0;
      rows.forEach((row, i) => {
        if (i===0 || !row[0]) return;
        saveShift({ id:'shift_'+Date.now()+'_'+i, date:selectedDate(), time:row[0]||'', task:row[1]||'', taskDescription:row[2]||'', pax:row[3]||'', porter:row[4]||'', auto:row[5]||'', note:row[6]||'', takenBy:'', completed:false });
        count++;
      });
      state.showImportModal = false; render();
      alert('Importati '+count+' turni!');
    };
    reader.readAsArrayBuffer(file);
  }

  function render() {
    const root = document.getElementById('root');
    if (state.loading) {
      root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#94a3b8;"><div style="width:36px;height:36px;border:3px solid #f97316;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>Caricamento...</div>`;
      return;
    }

    const todayShifts = state.shifts.filter(s => s.date === selectedDate()).sort((a,b)=>{ const ta=String(a.time||''); const tb=String(b.time||''); return ta.localeCompare(tb); });
    const completedCount = todayShifts.filter(s => s.completed).length;
    const skippedCount = todayShifts.filter(s => shiftStatus(s) === 'skipped').length;
    const dayLabels = ['Ieri','Oggi','Domani'];

    let html = `
      ${skippedCount > 0 ? `<div class="banner-skipped">⚠ ${skippedCount} task saltate!</div>` : ''}
      <div class="app-header">
        <div class="header-row">
          <div class="header-title">TaskBoard</div>
          <div class="header-actions">
            ${state.isAdmin ? `<button onclick="state.showImportModal=true;render();" title="Importa Excel">📥</button><button onclick="state.isAdmin=false;render();" title="Esci">🚪</button>` : ''}
            <div style="font-size:13px;color:#f97316;font-weight:600;">${nowStr()}</div>
            <div style="font-size:10px;${state.syncing?'color:#60a5fa':'color:#4ade80'}">${state.syncing?'⟳':'●'}</div>
          </div>
        </div>
        <div class="date-nav">
          ${[-1,0,1].map(o=>`<button class="date-btn ${state.dayOffset===o?'active':''}" onclick="state.dayOffset=${o};render();">📅 ${dayLabels[o+1]}</button>`).join('')}
          ${!state.isAdmin
            ? `<div class="admin-login"><input id="pwdInput" type="password" placeholder="Admin..."><button onclick="handleLogin()">→</button></div>`
            : `<span style="margin-left:auto;font-size:12px;color:#f97316;font-weight:600;">⚡ Admin</span>`}
        </div>
      </div>
      <div class="counter-bar">${completedCount}/${todayShifts.length} completate${skippedCount>0?` · <span class="red">${skippedCount} saltate</span>`:''}</div>
      <div class="shifts-list">`;

    if (todayShifts.length === 0) {
      html += `<div class="empty"><div style="font-size:48px;margin-bottom:12px;">📋</div><div style="font-size:16px;font-weight:600;margin-bottom:4px;">Nessuna task</div><div style="font-size:13px;">Tocca il + per aggiungere una task</div></div>`;
    } else {
      todayShifts.forEach(shift => {
        const st = shiftStatus(shift);
        let cls = 'shift-card';
        if (st==='skipped') cls+=' skipped';
        else if (st==='current') cls+=' current';
        else if (st==='completed') cls+=' completed';

        html += `<div class="${cls}" id="card-${shift.id}">
          <div class="card-top">
            <span class="card-time">🕐 ${shift.time||'--:--'}</span>
            ${st==='skipped'?`<span class="badge badge-skipped">▲ SALTATA</span>`:''}
            ${st==='current'?`<span class="badge badge-current">● IN CORSO</span>`:''}
            ${shift.pax?`<span class="badge badge-pax">👥 ${shift.pax}</span>`:''}
            ${shift.task?`<span class="badge badge-task">${shift.task}</span>`:''}
          </div>
          ${shift.taskDescription?`<div class="task-desc">${shift.taskDescription}</div>`:''}
          ${shift.porter||shift.auto?`<div class="card-meta">${shift.porter?`<span>👤 ${shift.porter}</span>`:''}${shift.auto?`<span>🚗 ${shift.auto}</span>`:''}</div>`:''}
          ${shift.note?`<div class="card-meta"><span>📝 ${shift.note}</span></div>`:''}
          <div class="take-row">
            <span>🤝</span>
            ${shift.takenBy
              ? `<span class="taken-name">${shift.takenBy}</span>`
              : `<input class="take-input" type="text" placeholder="Prendi in carico..." onblur="if(this.value.trim())handleTakeShift('${shift.id}',this.value)" onkeypress="if(event.key==='Enter'){handleTakeShift('${shift.id}',this.value);this.blur();}">`}
          </div>
          <div class="card-bottom">
            <div class="circle-check ${shift.completed?'done':''}" onclick="toggleComplete('${shift.id}')"></div>
            ${state.isAdmin?`<div class="card-actions"><button onclick="state.editingShift={...state.shifts.find(s=>s.id==='${shift.id}')};render();">✏️</button><button onclick="deleteShift('${shift.id}')">🗑️</button></div>`:'<div></div>'}
          </div>
        </div>`;
      });
    }

    html += `</div>`;
    if (state.isAdmin) html += `<button class="fab" onclick="state.showAddModal=true;render();">+</button>`;

    const taskTypes = ['BREAKFAST','ALLESTIMENTO','DEPARTURE','CHECK OUT','VILLA CHECK OUT','SHUTTLE','CHECK AUTO','REFILL'];
    if (state.showAddModal) {
      html += `<div class="modal-overlay" onclick="if(event.target===this){state.showAddModal=false;render();}"><div class="modal">
        <div class="modal-header"><h3>Nuova Task</h3><button onclick="state.showAddModal=false;render();">✕</button></div>
        <div class="modal-body">
          <div>
            <label>ORA *</label>
            <input type="time" value="${state.newShift.time}" onchange="state.newShift.time=this.value" placeholder="es. 08:00">
          </div>
          <div>
            <label>TIPO TASK *</label>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
              ${taskTypes.map(t => `
                <button onclick="state.newShift.task='${t}';render();"
                  style="padding:6px 14px;border-radius:20px;border:2px solid ${state.newShift.task===t?'#f97316':'#e2e8f0'};background:${state.newShift.task===t?'#fff7ed':'white'};color:${state.newShift.task===t?'#f97316':'#475569'};font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;">
                  ${t}
                </button>`).join('')}
            </div>
            <input type="text" value="${taskTypes.includes(state.newShift.task)?'':state.newShift.task}" onchange="state.newShift.task=this.value" placeholder="oppure scrivi tipo personalizzato">
          </div>
          <div>
            <label>DESCRIZIONE</label>
            <textarea rows="3" onchange="state.newShift.taskDescription=this.value" placeholder="Descrizione della task...">${state.newShift.taskDescription}</textarea>
          </div>
          <div>
            <label>PORTER</label>
            <input type="text" value="${state.newShift.porter}" onchange="state.newShift.porter=this.value" placeholder="Chi esegue la task">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div><label>PAX</label><input type="number" value="${state.newShift.pax}" onchange="state.newShift.pax=this.value" placeholder="N."></div>
            <div><label>AUTO</label><input type="text" value="${state.newShift.auto}" onchange="state.newShift.auto=this.value" placeholder="Auto"></div>
          </div>
          <div>
            <label>NOTE</label>
            <textarea rows="2" onchange="state.newShift.note=this.value" placeholder="Note aggiuntive...">${state.newShift.note}</textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="state.showAddModal=false;render();">Annulla</button>
          <button class="btn btn-primary" onclick="handleAddShift()" ${!state.newShift.time?'disabled':''}>+ Aggiungi</button>
        </div>
      </div></div>`;
    }

    if (state.editingShift) {
      const s = state.editingShift;
      html += `<div class="modal-overlay" onclick="if(event.target===this){state.editingShift=null;render();}"><div class="modal">
        <div class="modal-header"><h3>Modifica Task</h3><button onclick="state.editingShift=null;render();">✕</button></div>
        <div class="modal-body">
          <div>
            <label>ORA *</label>
            <input type="time" value="${s.time||''}" onchange="state.editingShift.time=this.value">
          </div>
          <div>
            <label>TIPO TASK</label>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
              ${taskTypes.map(t => `
                <button onclick="state.editingShift.task='${t}';render();"
                  style="padding:6px 14px;border-radius:20px;border:2px solid ${s.task===t?'#f97316':'#e2e8f0'};background:${s.task===t?'#fff7ed':'white'};color:${s.task===t?'#f97316':'#475569'};font-size:12px;font-weight:600;cursor:pointer;">
                  ${t}
                </button>`).join('')}
            </div>
            <input type="text" value="${taskTypes.includes(s.task)?'':s.task||''}" onchange="state.editingShift.task=this.value" placeholder="oppure scrivi tipo personalizzato">
          </div>
          <div><label>DESCRIZIONE</label><textarea rows="3" onchange="state.editingShift.taskDescription=this.value" placeholder="Descrizione della task...">${s.taskDescription||''}</textarea></div>
          <div><label>PORTER</label><input type="text" value="${s.porter||''}" onchange="state.editingShift.porter=this.value" placeholder="Chi esegue la task"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div><label>PAX</label><input type="number" value="${s.pax||''}" onchange="state.editingShift.pax=this.value" placeholder="N."></div>
            <div><label>AUTO</label><input type="text" value="${s.auto||''}" onchange="state.editingShift.auto=this.value" placeholder="Auto"></div>
          </div>
          <div><label>NOTE</label><textarea rows="2" onchange="state.editingShift.note=this.value" placeholder="Note aggiuntive...">${s.note||''}</textarea></div>
          <div><label>PRESO IN CARICO</label><input type="text" value="${s.takenBy||''}" onchange="state.editingShift.takenBy=this.value"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="state.editingShift=null;render();">Annulla</button>
          <button class="btn btn-primary" onclick="handleUpdateShift()">Salva</button>
        </div>
      </div></div>`;
    }

    if (state.showImportModal) {
      html += `<div class="modal-overlay" onclick="if(event.target===this){state.showImportModal=false;render();}"><div class="modal">
        <div class="modal-header"><h3>Importa Excel</h3><button onclick="state.showImportModal=false;render();">✕</button></div>
        <div class="modal-body">
          <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFileUpload(event)" style="display:none">
          <div onclick="document.getElementById('fileInput').click()" style="border:2px dashed #e2e8f0;border-radius:14px;padding:40px;text-align:center;cursor:pointer;">
            <div style="font-size:40px;margin-bottom:8px;">📊</div>
            <div style="font-weight:600;margin-bottom:4px;">Clicca per caricare</div>
            <div style="font-size:13px;color:#94a3b8;">Visibile a tutti i porter</div>
          </div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="state.showImportModal=false;render();">Annulla</button></div>
      </div></div>`;
    }

    root.innerHTML = html;
    const pwd = document.getElementById('pwdInput');
    if (pwd) {
      pwd.value = state.password;
      pwd.oninput = e => { state.password = e.target.value; };
      pwd.onkeypress = e => { if (e.key==='Enter') handleLogin(); };
    }
  }

  setInterval(() => { render(); checkSkipped(); setTimeout(scrollToCurrent, 200); }, 60000);
  setInterval(loadShifts, 10000);
  loadShifts();
</script>
</body>
</html>
