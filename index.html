<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turni Porter</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { font-family: 'Segoe UI', system-ui, sans-serif; box-sizing: border-box; font-size: 16px; }
    body { background: #f1f5f9; margin: 0; }

    .app-header { background: #1e293b; color: white; padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
    .banner-skipped { background: #7f1d1d; color: #fca5a5; text-align: center; padding: 8px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 101; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .header-title { font-size: 26px; font-weight: 700; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .header-actions button { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; padding: 4px; }
    .header-actions button:hover { color: white; }

    .date-nav { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .date-btn { background: #334155; border: none; color: #94a3b8; border-radius: 20px; padding: 5px 14px; font-size: 15px; cursor: pointer; transition: all 0.2s; }
    .date-btn.active { background: #475569; color: white; font-weight: 600; }
    .date-btn:hover { background: #475569; color: white; }

    .counter-bar { font-size: 14px; color: #94a3b8; padding: 6px 16px; background: #1e293b; border-top: 1px solid #334155; }
    .counter-bar span.red { color: #f87171; }

    .shifts-list { padding: 12px 12px 100px; }

    .shift-card { background: white; border-radius: 14px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid transparent; }
    .shift-card.skipped { background: #fff5f5; border-left-color: #ef4444; }
    .shift-card.current { border-left-color: #10b981; background: #f0fdf4; }
    .shift-card.completed { opacity: 0.5; }
    .shift-card.completed .badge-task,
    .shift-card.completed .card-time { text-decoration: line-through; color: #9ca3af; }
    .shift-card.completed .take-row,
    .shift-card.completed .task-desc,
    .shift-card.completed .card-meta { text-decoration: line-through; color: #9ca3af; }

    .card-top { display: flex; align-items: center; gap: 8px; padding: 12px 12px 6px; flex-wrap: wrap; }
    .card-time { font-size: 18px; font-weight: 700; color: #475569; display: flex; align-items: center; gap: 4px; }
    .badge { font-size: 13px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .badge-skipped { background: #fee2e2; color: #dc2626; }
    .badge-current { background: #d1fae5; color: #059669; }
    .badge-pax { background: #e2e8f0; color: #475569; }
    .badge-task { background: #ede9fe; color: #7c3aed; font-size: 14px; padding: 2px 10px; }

    .task-desc { font-size: 15px; color: #64748b; margin: 0 12px 8px; background: #f8fafc; border-left: 3px solid #a78bfa; padding: 6px 10px; border-radius: 0 8px 8px 0; }
    .card-meta { font-size: 14px; color: #94a3b8; padding: 0 12px 6px; }
    .card-meta span { margin-right: 10px; }

    .take-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-top: 1px solid #f1f5f9; }
    .take-input { flex: 1; border: none; background: none; font-size: 16px; color: #334155; outline: none; text-transform: uppercase; }
    .take-input::placeholder { color: #94a3b8; text-transform: none; }
    .taken-name { font-size: 16px; font-weight: 600; color: #059669; text-transform: uppercase; }

    .card-bottom { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px 10px; }
    .circle-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #cbd5e1; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .circle-check.done { background: #10b981; border-color: #10b981; }
    .circle-check.done::after { content: '✓'; color: white; font-size: 14px; font-weight: 700; }
    .card-actions { display: flex; gap: 6px; }
    .card-actions button { background: none; border: none; font-size: 16px; cursor: pointer; color: #94a3b8; padding: 4px; border-radius: 6px; }
    .card-actions button:hover { background: #f1f5f9; color: #475569; }

    .fab { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: #f97316; color: white; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 16px rgba(249,115,22,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; transition: transform 0.2s; }

    .empty { text-align: center; padding: 60px 20px; color: #94a3b8; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: white; border-radius: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .modal-header { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 1; }

    label { font-size: 13px; font-weight: 600; color: #475569; display: block; margin-bottom: 5px; }
    input[type=text], input[type=number], textarea { width: 100%; padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: border 0.2s; text-transform: uppercase; }

    .admin-login { display: flex; gap: 6px; align-items: center; margin-left: auto; }

    .cw-shift-section { margin-bottom: 20px; }
    .cw-shift-title { font-size: 13px; font-weight: 700; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; padding: 10px 4px 6px; }
    .cw-car-card { background: white; border-radius: 14px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .cw-car-name { font-size: 16px; font-weight: 700; color: #1e293b; padding: 12px 14px 8px; display: flex; align-items: center; gap: 8px; }

    .cw-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #cbd5e1; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .cw-dot.done { background: #3b82f6; border-color: #3b82f6; }
    .cw-dot.done::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; }

    /* Modal inserimento nome car wash */
    .cw-name-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 600; align-items: center; justify-content: center; padding: 16px; }
    .cw-name-modal.show { display: flex; }

    /* Report admin car wash */
    .cw-report-card { background: white; border-radius: 12px; margin-bottom: 10px; padding: 12px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .cw-report-car { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
    .cw-report-row { font-size: 13px; color: #64748b; margin-bottom: 3px; display: flex; gap: 6px; }
    .cw-report-done { color: #059669; font-weight: 600; }
    .cw-report-missing { color: #f87171; font-weight: 600; }

    /* Report Extra */
    .er-page { padding: 12px 12px 100px; }
    .er-header { background: #1e293b; color: white; padding: 12px 16px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; }
    .er-header-title { font-size: 22px; font-weight: 700; flex: 1; }
    .er-card { background: white; border-radius: 14px; margin-bottom: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #6366f1; }
    .er-card-time { font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
    .er-card-task { font-size: 16px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .er-card-meta { font-size: 13px; color: #64748b; display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
    .er-add-btn { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: #6366f1; color: white; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 16px rgba(99,102,241,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; transition: transform 0.2s; }
    .er-add-btn:hover { transform: scale(1.1); }
  </style>
</head>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDuE12IXeLyS5pUx7AzfHN8Os7kCnVUNBU",
    authDomain: "agenda-porter.firebaseapp.com",
    projectId: "agenda-porter",
    storageBucket: "agenda-porter.firebasestorage.app",
    messagingSenderId: "321152435125",
    appId: "1:321152435125:web:0d601e5718c871b5a08ffc"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const ADMIN_PASSWORD = 'porter2025';

  let state = {
    isAdmin: false, password: '', dayOffset: 0,
    shifts: [], loading: true, syncing: false,
    showAddModal: false, showImportModal: false, editingShift: null,
    newShift: { time:'', pax:'', task:'', taskDescription:'', porter:'', auto:'', note:'' },
    alertedShifts: new Set(),
    alertedCurrentShifts: new Set(),
    compactView: false,
    userScrolling: false,
    porterFilter: null,
    easterEggShown: false,
    page: 'main'
  };

  // Rileva scroll manuale dell'utente e sospende auto-scroll per 45 secondi
  let userScrollTimer = null;
  window.addEventListener('scroll', () => {
    state.userScrolling = true;
    clearTimeout(userScrollTimer);
    userScrollTimer = setTimeout(() => { state.userScrolling = false; }, 45000);
  }, { passive: true });

  function getDate(offset) {
    const d = new Date(); d.setDate(d.getDate() + offset);
    return d.toISOString().split('T')[0];
  }
  function selectedDate() { return getDate(state.dayOffset); }
  function timeToMin(t) { if (!t) return -1; const [h,m]=t.split(':').map(Number); return h*60+m; }
  function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
  function nowStr() { return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}); }

  function scrollToCurrent() {
    if (state.userScrolling) return; // utente sta guardando altrove, non interrompere
    // Prima prova task IN CORSO
    const current = document.querySelector('.current');
    if (current) { current.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
    // Altrimenti trova la task con orario più vicino all'ora attuale
    const now = nowMin();
    const today = state.shifts.filter(s => s.date === selectedDate() && s.time);
    if (today.length === 0) return;
    const closest = today.reduce((best, s) => {
      return Math.abs(timeToMin(s.time) - now) < Math.abs(timeToMin(best.time) - now) ? s : best;
    });
    const el = document.getElementById('card-' + closest.id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function shiftStatus(shift) {
    if (shift.completed) return 'completed';
    if (!shift.time) return 'normal';
    const diff = nowMin() - timeToMin(shift.time);
    if (diff >= 0 && diff < 15) return 'current';
    if (diff >= 15 && !shift.takenBy) return 'skipped';
    return 'normal';
  }

  function checkSkipped() {
    if (state.dayOffset !== 0) return;
    state.shifts.filter(s => s.date === selectedDate() && shiftStatus(s) === 'skipped' && !state.alertedShifts.has(s.id))
      .forEach(s => {
        state.alertedShifts.add(s.id);
        document.getElementById('skippedTaskName').textContent = s.task || '—';
        document.getElementById('skippedTaskTime').textContent = 'Orario: ' + (s.time || '');
        document.getElementById('skippedAlert').classList.add('show');
        if (navigator.vibrate) navigator.vibrate([300,100,300]);
      });
  }
  function closeSkippedAlert() { document.getElementById('skippedAlert').classList.remove('show'); }

  function playBeep(freq, duration) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  }

  function checkCurrent() {
    if (state.dayOffset !== 0) return;
    state.shifts.filter(s => s.date === selectedDate() && shiftStatus(s) === 'current' && !state.alertedCurrentShifts.has(s.id))
      .forEach(s => {
        state.alertedCurrentShifts.add(s.id);
        playBeep(880, 0.15);
        setTimeout(() => playBeep(1100, 0.2), 200);
        if (navigator.vibrate) navigator.vibrate([100, 80, 200]);
      });
  }

  function loadShifts() {
    state.syncing = true; render();
    db.collection('shifts').get().then(snap => {
      state.shifts = [];
      snap.forEach(doc => state.shifts.push({ id: doc.id, ...doc.data() }));
      state.loading = false; state.syncing = false; render();
      setTimeout(scrollToCurrent, 300);
      checkSkipped();
      checkCurrent();
    }).catch(e => { console.error(e); state.loading = false; state.syncing = false; render(); });
  }

  function saveShift(shift) {
    state.syncing = true; render();
    const { id, ...data } = shift;
    const docId = (id && id.startsWith('shift_')) ? id : 'shift_' + Date.now();
    db.collection('shifts').doc(docId).set(data).then(() => loadShifts())
      .catch(() => { alert('Errore salvataggio'); state.syncing = false; render(); });
  }

  function deleteShift(id) {
    if (!confirm('Eliminare questo turno?')) return;
    state.syncing = true; render();
    db.collection('shifts').doc(id).delete().then(() => loadShifts())
      .catch(() => { alert('Errore'); state.syncing = false; render(); });
  }

  function deleteAllShiftsForDay() {
    const date = selectedDate();
    const toDelete = state.shifts.filter(s => s.date === date);
    if (toDelete.length === 0) { alert('Nessuna task da eliminare per questo giorno.'); return; }
    if (!confirm(`Eliminare TUTTE le ${toDelete.length} task del giorno selezionato?`)) return;
    state.syncing = true; render();
    const batch = db.batch();
    toDelete.forEach(s => batch.delete(db.collection('shifts').doc(s.id)));
    batch.commit().then(() => loadShifts())
      .catch(() => { alert('Errore eliminazione'); state.syncing = false; render(); });
  }

  function toggleComplete(id) {
    const s = state.shifts.find(x => x.id === id);
    if (s) saveShift({ ...s, completed: !s.completed });
  }

  function handleLogin() {
    if (state.password.trim() === ADMIN_PASSWORD) { state.isAdmin = true; state.password = ''; render(); }
    else alert('Password errata!');
  }

  function handleLoginDirect(val) {
    if ((val||'').trim() === ADMIN_PASSWORD) { state.isAdmin = true; state.password = ''; render(); }
    else alert('Password errata!');
  }

  function handleTakeShift(id, name) {
    const s = state.shifts.find(x => x.id === id);
    if (s && name.trim()) saveShift({ ...s, takenBy: name.trim().toUpperCase() });
  }

  function handleAddShift() {
    if (!state.newShift.time) return;
    const s = state.newShift;
    saveShift({ id:'shift_'+Date.now(), date:selectedDate(), time:s.time, pax:s.pax, task:(s.task||'').toUpperCase(), taskDescription:(s.taskDescription||'').toUpperCase(), porter:(s.porter||'').toUpperCase(), auto:(s.auto||'').toUpperCase(), note:(s.note||'').toUpperCase(), takenBy:'', completed:false });
    state.showAddModal = false;
    state.newShift = { time:'', pax:'', task:'', taskDescription:'', porter:'', auto:'', note:'' };
    render();
  }

  function handleUpdateShift() { saveShift(state.editingShift); state.editingShift = null; render(); }

  function handleFileUpload(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
      let count = 0;
      rows.forEach((row, i) => {
        if (i===0 || !row[0]) return;
        saveShift({ id:'shift_'+Date.now()+'_'+i, date:selectedDate(), time:row[0]||'', task:row[1]||'', taskDescription:row[2]||'', pax:row[3]||'', porter:row[4]||'', auto:row[5]||'', note:row[6]||'', takenBy:'', completed:false });
        count++;
      });
      state.showImportModal = false; render();
      alert('Importati '+count+' turni!');
    };
    reader.readAsArrayBuffer(file);
  }

  function render() {
    // Routing pagine
    if (state.page === 'carwash') { renderCarWash(); return; }
    if (state.page === 'extrareport') { renderErPage(); return; }

    // Aggiorna la data reale selezionata ad ogni render
    selectedRealDate = getDate(state.dayOffset);
    // Controlla cambio data (gestisce ritorno dal background)
    checkDateChange();

    const root = document.getElementById('root');
    if (state.loading) {
      root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#94a3b8;"><div style="width:36px;height:36px;border:3px solid #f97316;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>Caricamento...</div>`;
      return;
    }

    const todayShifts = state.shifts.filter(s => s.date === selectedDate()).sort((a,b)=>{ const ta=String(a.time||''); const tb=String(b.time||''); return ta.localeCompare(tb); });
    const completedCount = todayShifts.filter(s => s.completed).length;
    const skippedCount = todayShifts.filter(s => shiftStatus(s) === 'skipped').length;
    const dayLabels = ['Ieri','Oggi','Domani'];

    // Calcola prossima task
    const now = nowMin();
    const upcoming = todayShifts.filter(s => !s.completed && s.time && timeToMin(s.time) > now);
    const nextShift = upcoming.length > 0 ? upcoming[0] : null;
    const nextMin = nextShift ? timeToMin(nextShift.time) - now : null;
    const nextLabel = nextMin !== null ? (nextMin <= 0 ? 'ora' : nextMin === 1 ? '1 min' : `${nextMin} min`) : null;

    // Lista porter unici del giorno (da porter o takenBy)
    const porterNames = [...new Set(todayShifts.flatMap(s => [s.porter, s.takenBy]).filter(Boolean))].sort();

    // Filtra per porter se attivo
    const visibleShifts = state.porterFilter
      ? todayShifts.filter(s => s.porter === state.porterFilter || s.takenBy === state.porterFilter)
      : todayShifts;

    // Aggiorna banner saltate esterno
    const bannerEl = document.getElementById('bannerSkipped');
    if (bannerEl) {
      if (skippedCount > 0) { bannerEl.style.display='block'; bannerEl.textContent=`⚠ ${skippedCount} task saltate!`; }
      else { bannerEl.style.display='none'; }
    }

    // Easter egg: chi ha preso in carico più task oggi
    const takenCounts = {};
    todayShifts.filter(s => s.takenBy).forEach(s => { takenCounts[s.takenBy] = (takenCounts[s.takenBy]||0) + 1; });
    const mvp = Object.entries(takenCounts).sort((a,b)=>b[1]-a[1])[0];
    const eggEl = document.getElementById('easterEggAlert');
    if (mvp && mvp[1] >= 7 && eggEl && !state.easterEggShown) {
      state.easterEggShown = true;
      document.getElementById('easterEggName').textContent = mvp[0];
      document.getElementById('easterEggCount').textContent = `${mvp[1]} task prese in carico oggi`;
      eggEl.style.display = 'flex';
    }

    let html = `
      <div class="app-header">
        <div class="header-row">
          <div class="header-title">TaskBoard</div>
          <div class="header-actions">
            <button onclick="state.page='carwash';state.showAddModal=false;renderCarWash();" title="Car Wash" style="font-size:18px;">🚗</button>
            <button onclick="state.page='extrareport';state.showAddModal=false;loadErData();" title="Report Extra" style="font-size:18px;">📋</button>
            ${state.isAdmin ? `<button onclick="deleteAllShiftsForDay()" title="Cancella tutto il giorno" style="color:#f87171;">🗑️</button><button onclick="state.showImportModal=true;render();" title="Importa Excel">📥</button><button onclick="state.isAdmin=false;render();" title="Esci">🚪</button>` : ''}
            <div style="font-size:13px;color:#f97316;font-weight:600;">${nowStr()}</div>
            ${nextLabel && state.dayOffset===0 ? `<div onclick="document.getElementById('card-${nextShift.id}')?.scrollIntoView({behavior:'smooth',block:'center'})" style="font-size:12px;color:#60a5fa;font-weight:600;cursor:pointer;white-space:nowrap;">⏱ ${nextLabel}</div>` : ''}
            <div style="font-size:10px;${state.syncing?'color:#60a5fa':'color:#4ade80'}">${state.syncing?'⟳':'●'}</div>
          </div>
        </div>
        <div class="date-nav">
          ${[-1,0,1].map(o=>`<button class="date-btn ${state.dayOffset===o?'active':''}" onclick="state.dayOffset=${o};selectedRealDate=getDate(${o});state.porterFilter=null;render();">📅 ${dayLabels[o+1]}</button>`).join('')}
          <button class="view-toggle-btn ${state.compactView?'active':''}" onclick="state.compactView=!state.compactView;render();" title="Vista compressa">${state.compactView?'📋 Compatta':'📋 Comprimi'}</button>
          ${!state.isAdmin
            ? `<div class="admin-login"><input id="pwdInput" type="password" placeholder="Admin..." onkeypress="if(event.key==='Enter')handleLoginDirect(this.value)"><button onclick="handleLoginDirect(document.getElementById('pwdInput').value)">→</button></div>`
            : `<span style="margin-left:auto;font-size:12px;color:#f97316;font-weight:600;">⚡ Admin</span>`}
        </div>
        ${porterNames.length > 0 ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
          ${porterNames.map(n => `<button onclick="state.porterFilter=state.porterFilter==='${n}'?null:'${n}';render();"
            style="padding:4px 12px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;background:${state.porterFilter===n?'#f97316':'#334155'};color:${state.porterFilter===n?'white':'#94a3b8'};">
            👤 ${n}
          </button>`).join('')}
        </div>` : ''}
      </div>
      <div class="counter-bar">${completedCount}/${todayShifts.length} completate${skippedCount>0?` · <span class="red">${skippedCount} saltate</span>`:''}</div>
      <div class="shifts-list">`;

    if (todayShifts.length === 0) {
      html += `<div class="empty"><div style="font-size:48px;margin-bottom:12px;">📋</div><div style="font-size:16px;font-weight:600;margin-bottom:4px;">Nessuna task</div><div style="font-size:13px;">Tocca il + per aggiungere una task</div></div>`;
    } else if (state.compactView) {
      // VISTA COMPRESSA
      visibleShifts.forEach(shift => {
        const st = shiftStatus(shift);
        let cls = 'compact-card';
        if (st==='skipped') cls+=' skipped';
        else if (st==='current') cls+=' current';
        else if (st==='completed') cls+=' completed';
        // Chi mostrare: prima takenBy, poi porter, poi dash
        const who = shift.takenBy || shift.porter || '';
        const whoLabel = who
          ? `<span class="compact-who">${who}</span>`
          : `<span class="compact-who empty">—</span>`;
        html += `<div class="${cls}" id="card-${shift.id}">
          <span class="compact-time">${shift.time||'--:--'}</span>
          <span class="compact-task">${shift.task||'—'}${st==='skipped'?' ⚠️':''}${st==='current'?' 🟢':''}</span>
          ${whoLabel}
        </div>`;
      });
    } else {
      visibleShifts.forEach(shift => {
        const st = shiftStatus(shift);
        let cls = 'shift-card';
        if (st==='skipped') cls+=' skipped';
        else if (st==='current') cls+=' current';
        else if (st==='completed') cls+=' completed';

        html += `<div class="${cls}" id="card-${shift.id}">
          <div class="card-top">
            <span class="card-time">🕐 ${shift.time||'--:--'}</span>
            ${st==='skipped'?`<span class="badge badge-skipped">▲ SALTATA</span>`:''}
            ${st==='current'?`<span class="badge badge-current">● IN CORSO</span>`:''}
            ${shift.pax?`<span class="badge badge-pax">👥 ${shift.pax}</span>`:''}
            ${shift.task?`<span class="badge badge-task">${shift.task}</span>`:''}
          </div>
          ${shift.taskDescription?`<div class="task-desc">${shift.taskDescription}</div>`:''}
          ${shift.porter||shift.auto?`<div class="card-meta">${shift.porter?`<span>👤 ${shift.porter}</span>`:''}${shift.auto?`<span>🚗 ${shift.auto}</span>`:''}</div>`:''}
          ${shift.note?`<div class="card-meta"><span>📝 ${shift.note}</span></div>`:''}
          <div class="take-row">
            <span>🤝</span>
            ${shift.takenBy
              ? `<span class="taken-name">${shift.takenBy}</span>`
              : `<input class="take-input" type="text" placeholder="Prendi in carico..." onblur="if(this.value.trim())handleTakeShift('${shift.id}',this.value)" onkeypress="if(event.key==='Enter'){handleTakeShift('${shift.id}',this.value);this.blur();}">`}
          </div>
          <div class="card-bottom">
            <div class="circle-check ${shift.completed?'done':''}" onclick="toggleComplete('${shift.id}')"></div>
            ${state.isAdmin?`<div class="card-actions"><button onclick="state.editingShift={...state.shifts.find(s=>s.id==='${shift.id}')};render();">✏️</button><button onclick="deleteShift('${shift.id}')">🗑️</button></div>`:'<div></div>'}
          </div>
        </div>`;
      });
    } // fine else vista normale

    html += `</div>`;
    // FAB admin gestito esternamente via #adminFab

    const taskTypes = ['BREAKFAST','ALLESTIMENTO','DEPARTURE','CHECK OUT','VILLA CHECK OUT','SHUTTLE','CHECK AUTO','REFILL'];
    if (state.showAddModal) {
      html += `<div class="modal-overlay" onclick="if(event.target===this){state.showAddModal=false;render();}"><div class="modal">
        <div class="modal-header"><h3>Nuova Task</h3><button onclick="state.showAddModal=false;render();">✕</button></div>
        <div class="modal-body">
          <div>
            <label>ORA *</label>
            <input type="time" value="${state.newShift.time}" onchange="state.newShift.time=this.value" placeholder="es. 08:00">
          </div>
          <div>
            <label>TIPO TASK *</label>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
              ${taskTypes.map(t => `
                <button onclick="state.newShift.task='${t}';render();"
                  style="padding:6px 14px;border-radius:20px;border:2px solid ${state.newShift.task===t?'#f97316':'#e2e8f0'};background:${state.newShift.task===t?'#fff7ed':'white'};color:${state.newShift.task===t?'#f97316':'#475569'};font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;">
                  ${t}
                </button>`).join('')}
            </div>
            <input type="text" value="${taskTypes.includes(state.newShift.task)?'':state.newShift.task}" onchange="state.newShift.task=this.value" placeholder="oppure scrivi tipo personalizzato">
          </div>
          <div>
            <label>DESCRIZIONE</label>
            <textarea rows="3" onchange="state.newShift.taskDescription=this.value" placeholder="Descrizione della task...">${state.newShift.taskDescription}</textarea>
          </div>
          <div>
            <label>PORTER</label>
            <input type="text" value="${state.newShift.porter}" onchange="state.newShift.porter=this.value" placeholder="Chi esegue la task">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div><label>PAX</label><input type="number" value="${state.newShift.pax}" onchange="state.newShift.pax=this.value" placeholder="N."></div>
            <div><label>AUTO</label><input type="text" value="${state.newShift.auto}" onchange="state.newShift.auto=this.value" placeholder="Auto"></div>
          </div>
          <div>
            <label>NOTE</label>
            <textarea rows="2" onchange="state.newShift.note=this.value" placeholder="Note aggiuntive...">${state.newShift.note}</textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="state.showAddModal=false;render();">Annulla</button>
          <button class="btn btn-primary" onclick="handleAddShift()" ${!state.newShift.time?'disabled':''}>+ Aggiungi</button>
        </div>
      </div></div>`;
    }

    if (state.editingShift) {
      const s = state.editingShift;
      html += `<div class="modal-overlay" onclick="if(event.target===this){state.editingShift=null;render();}"><div class="modal">
        <div class="modal-header"><h3>Modifica Task</h3><button onclick="state.editingShift=null;render();">✕</button></div>
        <div class="modal-body">
          <div>
            <label>ORA *</label>
            <input type="time" value="${s.time||''}" onchange="state.editingShift.time=this.value">
          </div>
          <div>
            <label>TIPO TASK</label>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
              ${taskTypes.map(t => `
                <button onclick="state.editingShift.task='${t}';render();"
                  style="padding:6px 14px;border-radius:20px;border:2px solid ${s.task===t?'#f97316':'#e2e8f0'};background:${s.task===t?'#fff7ed':'white'};color:${s.task===t?'#f97316':'#475569'};font-size:12px;font-weight:600;cursor:pointer;">
                  ${t}
                </button>`).join('')}
            </div>
            <input type="text" value="${taskTypes.includes(s.task)?'':s.task||''}" onchange="state.editingShift.task=this.value" placeholder="oppure scrivi tipo personalizzato">
          </div>
          <div><label>DESCRIZIONE</label><textarea rows="3" onchange="state.editingShift.taskDescription=this.value" placeholder="Descrizione della task...">${s.taskDescription||''}</textarea></div>
          <div><label>PORTER</label><input type="text" value="${s.porter||''}" onchange="state.editingShift.porter=this.value" placeholder="Chi esegue la task"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div><label>PAX</label><input type="number" value="${s.pax||''}" onchange="state.editingShift.pax=this.value" placeholder="N."></div>
            <div><label>AUTO</label><input type="text" value="${s.auto||''}" onchange="state.editingShift.auto=this.value" placeholder="Auto"></div>
          </div>
          <div><label>NOTE</label><textarea rows="2" onchange="state.editingShift.note=this.value" placeholder="Note aggiuntive...">${s.note||''}</textarea></div>
          <div><label>PRESO IN CARICO</label><input type="text" value="${s.takenBy||''}" onchange="state.editingShift.takenBy=this.value"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="state.editingShift=null;render();">Annulla</button>
          <button class="btn btn-primary" onclick="handleUpdateShift()">Salva</button>
        </div>
      </div></div>`;
    }

    if (state.showImportModal) {
      html += `<div class="modal-overlay" onclick="if(event.target===this){state.showImportModal=false;render();}"><div class="modal">
        <div class="modal-header"><h3>Importa Excel</h3><button onclick="state.showImportModal=false;render();">✕</button></div>
        <div class="modal-body">
          <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFileUpload(event)" style="display:none">
          <div onclick="document.getElementById('fileInput').click()" style="border:2px dashed #e2e8f0;border-radius:14px;padding:40px;text-align:center;cursor:pointer;">
            <div style="font-size:40px;margin-bottom:8px;">📊</div>
            <div style="font-weight:600;margin-bottom:4px;">Clicca per caricare</div>
            <div style="font-size:13px;color:#94a3b8;">Visibile a tutti i porter</div>
          </div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="state.showImportModal=false;render();">Annulla</button></div>
      </div></div>`;
    }

    root.innerHTML = html;

    // Mostra/nasconde FAB admin esterno
    const adminFab = document.getElementById('adminFab');
    if (adminFab) adminFab.style.display = (state.isAdmin && state.page === 'main') ? 'block' : 'none';

    const pwd = document.getElementById('pwdInput');
    if (pwd) {
      pwd.value = state.password;
      pwd.oninput = e => { state.password = e.target.value; };
      pwd.onkeypress = e => { if (e.key==='Enter') handleLogin(); };
    }
  }

  // ============ CAR WASH ============
  const CW_CARS = ['Defender Rosso','Defender Nero','Van','Range Rover Bianco'];
  const CW_SHIFTS = ['AM','PM'];
  const CW_TYPES = ['interno','esterno'];
  let cwPending = null; // { shift, car, type }
  let cwData = {}; // { date: { AM: { 'Defender Rosso': { interno: {name,ts}, esterno: {name,ts} } } } }

  function cwKey() { return getDate(0); }

  function loadCwData() {
    db.collection('carwash').doc(cwKey()).get().then(doc => {
      cwData = doc.exists ? doc.data() : {};
      if (state.page === 'carwash') renderCarWash();
    }).catch(() => {});
  }

  function saveCwEntry(shift, car, type, name) {
    const date = cwKey();
    if (!cwData[shift]) cwData[shift] = {};
    if (!cwData[shift][car]) cwData[shift][car] = {};
    cwData[shift][car][type] = { name, ts: Date.now() };
    db.collection('carwash').doc(date).set(cwData).then(() => renderCarWash()).catch(() => {});
  }

  function openCwModal(shift, car, type) {
    cwPending = { shift, car, type };
    document.getElementById('cwNameModal').classList.add('show');
    setTimeout(() => document.getElementById('cwNameInput').focus(), 100);
  }

  function closeCwModal() {
    cwPending = null;
    document.getElementById('cwNameModal').classList.remove('show');
    document.getElementById('cwNameInput').value = '';
  }

  function confirmCwWash() {
    const name = document.getElementById('cwNameInput').value.trim().toUpperCase();
    if (!name) { alert('Inserisci il tuo nome'); return; }
    saveCwEntry(cwPending.shift, cwPending.car, cwPending.type, name);
    closeCwModal();
  }

  // Enter key nel modal car wash
  document.getElementById('cwNameInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') confirmCwWash();
  });

  function renderCarWash() {
    const root = document.getElementById('root');
    const today = cwKey();

    // Header
    let html = `<div class="cw-header">
      <button class="cw-back" onclick="state.page='main';state.showAddModal=false;render();">←</button>
      <div class="cw-header-title">🚗 Car Wash</div>
      <div style="font-size:12px;color:#94a3b8;">${today}</div>
    </div>`;

    // Se admin mostra report, altrimenti vista porter
    if (state.isAdmin) {
      html += `<div class="cw-page">
        <div style="font-size:13px;font-weight:700;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;padding:4px 0 12px;">📊 Report del giorno</div>`;
      CW_SHIFTS.forEach(shift => {
        html += `<div style="font-size:12px;font-weight:700;color:#f97316;letter-spacing:1px;margin-bottom:6px;">${shift} SHIFT</div>`;
        CW_CARS.forEach(car => {
          const interno = cwData[shift]?.[car]?.interno;
          const esterno = cwData[shift]?.[car]?.esterno;
          html += `<div class="cw-report-card">
            <div class="cw-report-car">🚙 ${car}</div>
            <div class="cw-report-row">
              <span>🪣 Interno:</span>
              ${interno ? `<span class="cw-report-done">✓ ${interno.name}</span>` : `<span class="cw-report-missing">— non fatto</span>`}
            </div>
            <div class="cw-report-row">
              <span>✨ Esterno:</span>
              ${esterno ? `<span class="cw-report-done">✓ ${esterno.name}</span>` : `<span class="cw-report-missing">— non fatto</span>`}
            </div>
          </div>`;
        });
      });
      html += `</div>`;
    } else {
      html += `<div class="cw-page">`;
      CW_SHIFTS.forEach(shift => {
        html += `<div class="cw-shift-section">
          <div class="cw-shift-title">☀️ ${shift} Shift</div>`;
        CW_CARS.forEach(car => {
          html += `<div class="cw-car-card">
            <div class="cw-car-name">🚙 ${car}</div>`;
          CW_TYPES.forEach(type => {
            const entry = cwData[shift]?.[car]?.[type];
            const icon = type === 'interno' ? '🪣' : '✨';
            html += `<div class="cw-wash-row">
              <span class="cw-wash-label">${icon} Lavaggio ${type}</span>
              ${entry
                ? `<span class="cw-wash-info">✓ ${entry.name}</span>`
                : `<span class="cw-wash-info empty">—</span>`}
              <div class="cw-dot ${entry?'done':''}" onclick="${entry ? '' : `openCwModal('${shift}','${car}','${type}')`}" style="${entry?'cursor:default':''}"></div>
            </div>`;
          });
          html += `</div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }

    root.innerHTML = html;
  }

  // ============ FINE CAR WASH ============

  // ============ EXTRA REPORT ============
  let erData = [];

  function loadErData() {
    const date = getDate(0);
    db.collection('extrareport').where('date','==',date).get().then(snap => {
      erData = [];
      snap.forEach(doc => erData.push({ id: doc.id, ...doc.data() }));
      erData.sort((a,b) => (a.ts||0) - (b.ts||0));
      renderErPage();
    }).catch(e => { console.error(e); erData = []; renderErPage(); });
  }

  function openErModal() {
    const now = new Date();
    document.getElementById('erTime').value = now.toTimeString().slice(0,5);
    document.getElementById('erCaller').value = '';
    document.getElementById('erTask').value = '';
    document.getElementById('erPorter').value = '';
    document.getElementById('erModal').style.display = 'flex';
  }

  function closeErModal() {
    document.getElementById('erModal').style.display = 'none';
  }

  function confirmErReport() {
    const time = document.getElementById('erTime').value;
    const caller = document.getElementById('erCaller').value.trim().toUpperCase();
    const task = document.getElementById('erTask').value.trim().toUpperCase();
    const porter = document.getElementById('erPorter').value.trim().toUpperCase();
    if (!time || !caller || !task || !porter) { alert('Compila tutti i campi obbligatori'); return; }
    const date = getDate(0);
    db.collection('extrareport').add({ date, time, caller, task, porter, ts: Date.now() })
      .then(() => { closeErModal(); loadErData(); })
      .catch(() => alert('Errore salvataggio'));
  }

  function renderErPage() {
    const root = document.getElementById('root');
    const date = getDate(0);
    let html = `<div class="er-header">
      <button class="cw-back" onclick="state.page='main';state.showAddModal=false;render();">←</button>
      <div class="er-header-title">📋 Report Extra</div>
      <div style="font-size:12px;color:#94a3b8;">${date}</div>
    </div>
    <div class="er-page">`;

    if (erData.length === 0) {
      html += `<div class="empty"><div style="font-size:48px;margin-bottom:12px;">📋</div><div style="font-size:16px;font-weight:600;margin-bottom:4px;">Nessuna segnalazione</div><div style="font-size:13px;">Tocca + per aggiungere</div></div>`;
    } else {
      // Admin vede tutto con contatore, gli altri vedono la lista
      if (state.isAdmin) {
        html += `<div style="font-size:13px;color:#6366f1;font-weight:700;padding:4px 0 12px;">📊 ${erData.length} segnalazion${erData.length===1?'e':'i'} oggi</div>`;
      }
      erData.forEach(r => {
        html += `<div class="er-card">
          <div class="er-card-time">🕐 ${r.time}</div>
          <div class="er-card-task">${r.task}</div>
          <div class="er-card-meta">
            <span>📞 ${r.caller}</span>
            <span>👤 ${r.porter}</span>
            ${state.isAdmin ? `<button onclick="deleteErEntry('${r.id}')" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:13px;padding:0;margin-left:auto;">🗑️</button>` : ''}
          </div>
        </div>`;
      });
    }
    html += `</div><button class="er-add-btn" onclick="openErModal()">+</button>`;
    root.innerHTML = html;
  }

  function deleteErEntry(id) {
    if (!confirm('Eliminare questa segnalazione?')) return;
    db.collection('extrareport').doc(id).delete().then(() => loadErData()).catch(() => alert('Errore'));
  }
  // ============ FINE EXTRA REPORT ============

  // Tiene traccia della data reale selezionata (non dell'offset)
  // Così a mezzanotte, anche se l'app era in background, si ricalibra correttamente
  let selectedRealDate = getDate(state.dayOffset);

  function checkDateChange() {
    const todayReal = getDate(0);
    // Calcola il nuovo offset basato sulla data reale selezionata
    const msDay = 86400000;
    const diff = Math.round((new Date(selectedRealDate) - new Date(todayReal)) / msDay);
    const newOffset = Math.max(-1, Math.min(1, diff));
    if (newOffset !== state.dayOffset) {
      state.dayOffset = newOffset;
    }
  }

  setInterval(() => {
    checkDateChange();
    render(); checkSkipped(); checkCurrent(); setTimeout(scrollToCurrent, 200);
  }, 60000);
  setInterval(loadShifts, 10000);
  setInterval(loadCwData, 15000);
  loadShifts();
  loadCwData();
</script>
</body>
</html>
